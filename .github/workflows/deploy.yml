name: Deploy to Cloudflare Pages

# Gate-then-deploy: every push to main runs the full quality suite
# (type check -> unit tests -> build, which itself runs the link gate)
# and only deploys dist/ to the statohub Pages project if all gates pass.
# A broken push cannot ship to production.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Never run two production deploys at once; let an in-flight one finish.
concurrency:
  group: pages-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Unit tests
        run: npm test

      - name: Contrast check
        run: node scripts/check-contrast.mjs

      - name: Build (runs route-id gen + astro build + link gate)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account ID is not a secret; it is useless without the token above.
          accountId: 027007f4d056b885d434f48b4f136a07
          wranglerVersion: "3"
          command: pages deploy dist --project-name statohub --branch main
