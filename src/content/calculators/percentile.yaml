title: Percentile Calculator
description: Calculate a percentile value and quartiles for a data set.
engine: percentile
category: descriptive-statistics
standalone: true
chart: false
inputs:
  - name: values
    label: Values
    type: numberList
    placeholder: 2, 4, 4, 5, 7, 9
  - name: p
    label: Percentile
    type: number
    placeholder: "90"
outputLabels:
  q1: Q1
  q2: Median
  q3: Q3
  iqr: IQR
keywords:
  - percentile calculator
